# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "PHN V2 Local"

[setup]
script = '''
set -euo pipefail

repo_root="$(git rev-parse --show-toplevel)"
cd "${repo_root}"

echo "Setting up PH-Navigator V2 local Codex environment in ${repo_root}"

cd backend
uv python install 3.11
uv sync --frozen
cd ..

cd frontend
pnpm install --frozen-lockfile
cd ..

if [[ ! -f backend/.env ]]; then
  cp backend/.env.example backend/.env
fi

if [[ ! -f frontend/.env.local ]]; then
  cp frontend/.env.example frontend/.env.local
fi

# Keep heavyweight, regenerated dependency folders out of Dropbox sync when a
# worktree lives under a Dropbox-backed path. This is a no-op outside Dropbox.
if command -v xattr >/dev/null 2>&1; then
  [[ -d backend/.venv ]] && xattr -w com.dropbox.ignored 1 backend/.venv 2>/dev/null || true
  [[ -d frontend/node_modules ]] && xattr -w com.dropbox.ignored 1 frontend/node_modules 2>/dev/null || true
fi

echo "PH-Navigator V2 local Codex environment is ready."
'''

[[actions]]
name = "Sync"
icon = "tool"
command = "make sync"

[[actions]]
name = "Dev Services"
icon = "run"
command = "make dev"

[[actions]]
name = "Backend"
icon = "run"
command = "make backend"

[[actions]]
name = "Frontend"
icon = "run"
command = "make frontend"

[[actions]]
name = "Smoke"
icon = "tool"
command = "make smoke"

[[actions]]
name = "Backend Check"
icon = "tool"
command = "make check-backend"

[[actions]]
name = "Frontend Check"
icon = "tool"
command = "make check-frontend"

[[actions]]
name = "All Check"
icon = "tool"
command = "make check"

[[actions]]
name = "E2E"
icon = "tool"
command = "make e2e"

# Local-dev ecosystem for PH-Navigator V2.
# Backend and frontend run on the host (faster reloads); only services
# that need a daemon live here. See context/environment-setup.md §9.

services:
  db:
    image: postgres:16
    container_name: phn-v2-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ph_navigator_v2}
      POSTGRES_USER: ${POSTGRES_USER:-phn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phn_local_only}
    volumes:
      - phn_v2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      # `-d` is required: pg_isready defaults dbname to the username
      # when omitted, so without it the probe asks for `dbname=phn`
      # (which doesn't exist) and fills the log with FATAL noise — even
      # though the probe still returns healthy because the server
      # responded.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phn} -d ${POSTGRES_DB:-ph_navigator_v2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-store:
    image: minio/minio:latest
    container_name: phn-v2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-phn_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-phn_minio_local_only}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-*}
    volumes:
      - phn_v2_minio_data:/data

volumes:
  phn_v2_postgres_data:
  phn_v2_minio_data:

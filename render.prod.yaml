# render.prod.yaml — PH-Navigator production Blueprint
#
# Phase 1 smoke hosts before DNS cutover (completed):
# - Frontend: https://ph-navigator-web.onrender.com
# - Backend API: https://ph-navigator-api.onrender.com
#
# Phase 2 custom-domain production target:
# - Frontend: https://www.ph-nav.com + https://ph-nav.com
# - Backend API: https://api.ph-nav.com
# - R2 bucket: ph-navigator-prod
#
# PUBLIC REPO RULE: this file is committed and the repo is public. It contains
# ONLY non-secret config. Every secret or account-identifying value is
# `sync: false` and must be entered in Render/Apple Passwords, never committed.
#
# Current URL env targets the custom-domain production stack.
#
# DEPLOY TRIGGER: auto-deploy is OFF for both services — merging to `main`
# does NOT deploy. The "Deploy Production" GitHub Actions workflow is the only
# deploy trigger; see context/PRODUCTION_DEPLOYMENT.md → "Deployment Workflow".

databases:
  - name: ph-navigator-db
    databaseName: ph_navigator
    plan: basic-256mb
    diskSizeGB: 1
    region: ohio
    postgresMajorVersion: "16"

services:
  # ----------------------------------------------------------------------------
  # Backend — FastAPI (uv) web service
  # Custom domain: https://api.ph-nav.com
  # ----------------------------------------------------------------------------
  - type: web
    name: ph-navigator-api
    runtime: python
    rootDir: backend
    autoDeployTrigger: "off"
    # Match the legacy V0 backend tier for the initial production cutover.
    plan: standard
    region: ohio
    healthCheckPath: /api/v1/health
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: >-
      export GIT_SHA="$RENDER_GIT_COMMIT" &&
      uv run alembic upgrade head &&
      uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "0.1.0"
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: ph-navigator-db
          property: connectionString
      - key: DATABASE_POOL_MIN_SIZE
        value: "2"
      - key: DATABASE_POOL_MAX_SIZE
        value: "10"
      - key: DATABASE_POOL_TIMEOUT_SECONDS
        value: "10"
      - key: SLOW_QUERY_MS
        value: "500"
      - key: PROJECT_DOCUMENT_MAX_BODY_BYTES
        value: "8388608"
      - key: CORS_ORIGINS
        value: https://www.ph-nav.com,https://ph-nav.com
      - key: SESSION_COOKIE_NAME
        value: phn_session
      - key: SESSION_LIFETIME_MINUTES
        value: "480"
      # www.ph-nav.com and api.ph-nav.com are same-site under ph-nav.com.
      - key: SESSION_COOKIE_SAMESITE
        value: lax
      - key: FRONTEND_BASE_URL
        value: https://www.ph-nav.com
      - key: MCP_ISSUER_URL
        value: https://api.ph-nav.com
      - key: MCP_RESOURCE_SERVER_URL
        value: https://api.ph-nav.com/mcp
      - key: MCP_ENABLE_DNS_REBINDING_PROTECTION
        value: "true"
      - key: MCP_ALLOWED_HOSTS
        value: api.ph-nav.com
      - key: MCP_ALLOWED_ORIGINS
        value: https://www.ph-nav.com,https://ph-nav.com
      - key: R2_BUCKET
        value: ph-navigator-prod
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: FERNET_SECRET_KEY
        sync: false
      - key: ACCOUNT_TOKEN_SECRET
        sync: false

  # ----------------------------------------------------------------------------
  # Frontend — Vite/React static site
  # Custom domains: https://www.ph-nav.com and https://ph-nav.com
  # ----------------------------------------------------------------------------
  - type: web
    name: ph-navigator-web
    runtime: static
    rootDir: frontend
    autoDeployTrigger: "off"
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Build assets carry a content hash in their filename, so they are safe to
    # cache forever. This removes the per-asset revalidation round-trip on warm
    # navigations (notably the woff2 fonts, which were re-downloading in full).
    # index.html is intentionally NOT matched here: it keeps Render's default
    # Cache-Control: max-age=0 so a new deploy is picked up immediately.
    headers:
      - path: /version.json
        name: Cache-Control
        value: "no-store, max-age=0, must-revalidate"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.ph-nav.com

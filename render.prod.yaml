# render.prod.yaml — PH-Navigator V1 production Blueprint
#
# Phase 1 smoke hosts before DNS cutover:
# - Frontend: https://ph-navigator-web.onrender.com
# - Backend API: https://ph-navigator-api.onrender.com
#
# Target production end-state after DNS/repo canonicalization:
# - Frontend: https://www.ph-nav.com + https://ph-nav.com
# - Backend API: https://api.ph-nav.com
# - R2 bucket: ph-navigator-prod
#
# PUBLIC REPO RULE: this file is committed and the repo is public. It contains
# ONLY non-secret config. Every secret or account-identifying value is
# `sync: false` and must be entered in Render/Apple Passwords, never committed.
#
# Phase 2 retargets the URL env vars below from the Render hosts to the custom
# domains. Keep Phase 1 on Render hosts so invite/reset links and frontend API
# calls work before DNS cutover.

databases:
  - name: ph-navigator-db
    databaseName: ph_navigator
    plan: basic-256mb
    diskSizeGB: 1
    region: ohio
    postgresMajorVersion: "16"

services:
  # ----------------------------------------------------------------------------
  # Backend — FastAPI (uv) web service
  # Phase 1 URL: https://ph-navigator-api.onrender.com
  # Phase 2 custom domain: https://api.ph-nav.com
  # ----------------------------------------------------------------------------
  - type: web
    name: ph-navigator-api
    runtime: python
    rootDir: backend
    # Match the legacy V0 backend tier for the initial production cutover.
    plan: standard
    region: ohio
    healthCheckPath: /api/v1/health
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: >-
      export GIT_SHA="$RENDER_GIT_COMMIT" &&
      uv run alembic upgrade head &&
      uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "0.1.0"
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: ph-navigator-db
          property: connectionString
      - key: DATABASE_POOL_MIN_SIZE
        value: "2"
      - key: DATABASE_POOL_MAX_SIZE
        value: "10"
      - key: DATABASE_POOL_TIMEOUT_SECONDS
        value: "10"
      - key: SLOW_QUERY_MS
        value: "500"
      - key: PROJECT_DOCUMENT_MAX_BODY_BYTES
        value: "8388608"
      - key: CORS_ORIGINS
        value: https://ph-navigator-web.onrender.com
      - key: SESSION_COOKIE_NAME
        value: phn_session
      - key: SESSION_LIFETIME_MINUTES
        value: "60"
      - key: SESSION_COOKIE_SAMESITE
        value: lax
      - key: FRONTEND_BASE_URL
        value: https://ph-navigator-web.onrender.com
      - key: MCP_ISSUER_URL
        value: https://ph-navigator-api.onrender.com
      - key: MCP_RESOURCE_SERVER_URL
        value: https://ph-navigator-api.onrender.com/mcp
      - key: MCP_ENABLE_DNS_REBINDING_PROTECTION
        value: "true"
      - key: MCP_ALLOWED_HOSTS
        value: ph-navigator-api.onrender.com
      - key: MCP_ALLOWED_ORIGINS
        value: https://ph-navigator-web.onrender.com
      - key: R2_BUCKET
        value: ph-navigator-prod
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: FERNET_SECRET_KEY
        sync: false
      - key: ACCOUNT_TOKEN_SECRET
        sync: false

  # ----------------------------------------------------------------------------
  # Frontend — Vite/React static site
  # Phase 1 URL: https://ph-navigator-web.onrender.com
  # Phase 2 custom domains: https://www.ph-nav.com and https://ph-nav.com
  # ----------------------------------------------------------------------------
  - type: web
    name: ph-navigator-web
    runtime: static
    rootDir: frontend
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ph-navigator-api.onrender.com

# render.yaml — PH-Navigator V2 staging Blueprint (Infrastructure-as-Code)
#
# Declares the full Render `Staging` environment so it can be re-provisioned
# from code instead of manual dashboard entry. `DATABASE_URL` auto-wires from
# the database block via `fromDatabase`, so replacing the (free, monthly-
# expiring) Postgres is a one-click re-apply with NO copy/paste.
#
# PUBLIC REPO RULE: this file is committed and the repo is public. It contains
# ONLY non-secret config. Every secret (R2 credentials, R2 account id /
# endpoint, Fernet key) is `sync: false` — Render prompts for the value once on
# first apply and stores it server-side; it is never written here. Keep secrets
# in 1Password (PH-Navigator R2 / Fernet items) and paste into Render only.
#
# Source of truth for the values below: context/ENVIRONMENT.md → "Render staging".
# Apply / re-provision runbook: same file → "Render staging" (Blueprint apply).

databases:
  - name: ph-navigator-v2-staging-db
    databaseName: ph_navigator_v2
    plan: free # staging is synthetic seed data only; paid Postgres comes at prod
    region: ohio # US East — must match the backend service for the internal URL
    postgresMajorVersion: "16"

services:
  # ----------------------------------------------------------------------------
  # Backend — FastAPI (uv) web service
  # https://ph-navigator-v2.onrender.com
  # ----------------------------------------------------------------------------
  - type: web
    name: ph-navigator-v2-api-staging
    runtime: python
    rootDir: backend
    plan: free
    region: ohio # same region as the DB so the internal connection string works
    buildCommand: pip install uv && uv sync --frozen --no-dev
    # GIT_SHA is sourced from Render's native RENDER_GIT_COMMIT at process start
    # (the app's logging reads GIT_SHA); the rest is migrate-then-serve.
    startCommand: >-
      export GIT_SHA="$RENDER_GIT_COMMIT" &&
      uv run alembic upgrade head &&
      uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENVIRONMENT
        value: staging
      - key: APP_VERSION
        value: "0.1.0"
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO
      # DATABASE_URL is auto-wired from the database block — no manual paste.
      - key: DATABASE_URL
        fromDatabase:
          name: ph-navigator-v2-staging-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://ph-navigator-v2-staging.onrender.com
      - key: SESSION_COOKIE_NAME
        value: phn_session
      - key: SESSION_LIFETIME_MINUTES
        value: "60"
      # Split-origin staging (separate frontend/backend subdomains) needs
      # SameSite=None + HTTPS so the browser stores the API session cookie.
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: MCP_ISSUER_URL
        value: https://ph-navigator-v2.onrender.com
      - key: MCP_RESOURCE_SERVER_URL
        value: https://ph-navigator-v2.onrender.com/mcp
      - key: MCP_ENABLE_DNS_REBINDING_PROTECTION
        value: "true"
      - key: MCP_ALLOWED_HOSTS
        value: ph-navigator-v2.onrender.com
      - key: MCP_ALLOWED_ORIGINS
        value: https://ph-navigator-v2-staging.onrender.com
      - key: R2_BUCKET
        value: ph-navigator-v2-dev
      # Secrets / account-identifying values — entered once in Render, never here.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ENDPOINT_URL # https://<account-id>.r2.cloudflarestorage.com
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: FERNET_SECRET_KEY
        sync: false
      # Render also injects RENDER_EXTERNAL_URL / RENDER_EXTERNAL_HOSTNAME /
      # RENDER_GIT_COMMIT automatically; the backend derives MCP host allowlist
      # entries from them, so they do not need to be declared here.

  # ----------------------------------------------------------------------------
  # Frontend — Vite/React static site
  # https://ph-navigator-v2-staging.onrender.com
  # ----------------------------------------------------------------------------
  - type: web
    name: ph-navigator-v2-staging
    runtime: static
    rootDir: frontend
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: dist
    # SPA fallback: every path serves the built index.html (client-side routing).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ph-navigator-v2.onrender.com
